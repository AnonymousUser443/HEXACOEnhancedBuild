version: '3.8'

services:
  backend:
    build: ./backend
    container_name: personality-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./backend/data:/app/data
    networks:
      - personality-network

  frontend:
    build: ./frontend
    container_name: personality-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
    networks:
      - personality-network

networks:
  personality-network:
    driver: bridge